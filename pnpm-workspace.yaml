# pnpm settings (pnpm 11+ reads project settings from here, not package.json)

# Native deps allowed to run install scripts
onlyBuiltDependencies:
  - esbuild
  - lightningcss
  - sharp
  - workerd

# Resilient install settings (network can be flaky)
fetchRetries: 6
fetchRetryMintimeout: 20000
fetchRetryMaxtimeout: 120000
networkConcurrency: 4
autoInstallPeers: true
minimumReleaseAgeExclude:
  - "@cloudflare/vite-plugin@1.40.0"
  - miniflare@4.20260603.0
  - wrangler@4.98.0
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
